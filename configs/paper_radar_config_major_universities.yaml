curation:
  generated_at: '2026-04-18'
  selection_policy:
  - 이 preset은 current paper-radar 코드가 arXiv search_query 문자열을 그대로 전달하는 구조를 이용한다.
  - 'arXiv에서는 au: author field를 공식 지원하므로, 대학 검색은 소속명 직접 검색 대신 대표 연구자 proxy-author 방식으로 구성했다.'
  - 대학 선정은 CSRankings/주요 글로벌 CS 랭킹에 반복적으로 등장하는 기관과 실제 arXiv 출력이 많은 그룹을 우선했다.
  - 엄격한 affiliation 검색이 필요하면 수집기를 affiliation-aware source로 확장하는 것이 더 적합하다.
  proxy_author_mode: true
