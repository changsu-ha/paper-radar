sources:
  arxiv:
    enabled: true
    categories:
    - cs.LG
    - stat.ML
    - cs.CL
    - cs.AI
    - cs.CV
    - cs.IR
    - math.OC
    - math.ST
    queries:
    - (au:"Percy Liang" OR au:"Christopher D Manning" OR au:"Dan Jurafsky" OR au:"Stefano Ermon" OR au:"Tengyu Ma" OR au:"Fei-Fei Li")
    - (au:"Tommi Jaakkola" OR au:"Stefanie Jegelka" OR au:"Jacob Andreas" OR au:"Aleksander Madry" OR au:"Phillip Isola")
    - (au:"Michael I Jordan" OR au:"Peter L Bartlett" OR au:"Jacob Steinhardt" OR au:"Stuart Russell" OR au:"Ion Stoica")
    - (au:"Ruslan Salakhutdinov" OR au:"Zico Kolter" OR au:"Graham Neubig" OR au:"Aarti Singh")
    - (au:"Geoffrey Hinton" OR au:"Jimmy Ba" OR au:"Roger Grosse" OR au:"David Duvenaud" OR au:"Richard Zemel")
    - (au:"Zoubin Ghahramani" OR au:"Neil Lawrence" OR au:"Jose Miguel Hernandez-Lobato" OR au:"Richard Turner")
    - (au:"Yarin Gal" OR au:"Michael Bronstein" OR au:"Yee Whye Teh")
    - (au:"Bernhard Schoelkopf" OR au:"Thomas Hofmann" OR au:"Andreas Krause" OR au:"Fanny Yang" OR au:"Gunnar Raetsch")
    - (au:"Yoshua Bengio" OR au:"Aaron Courville" OR au:"Doina Precup" OR au:"Guillaume Alain")
    days_back_daily: 21
    days_back_weekly: 90
    max_results_per_query: 12
  openreview:
    enabled: false
    venues: []
    keywords: []
  semanticscholar:
    enabled: true
    api_key_env: SEMANTIC_SCHOLAR_API_KEY
  openalex:
    enabled: true
    api_key_env: OPENALEX_API_KEY
