    - stat.ML
    - math.ST
    - math.OC
    queries:
    - generalization OR sample complexity OR excess risk OR minimax
    - PAC-Bayes OR Rademacher complexity OR stability OR sharpness
    - optimization theory OR convergence rate OR stochastic approximation OR implicit
      bias
    - in-context learning theory OR transformer theory OR scaling law theory
    - double descent OR grokking OR feature learning theory OR neural tangent
