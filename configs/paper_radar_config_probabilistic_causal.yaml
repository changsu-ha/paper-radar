    must_read: 80
    worth_reading: 65
    skim: 50
digest:
  daily_top_k: 10
  weekly_top_k_per_track: 6
  tracks:
  - causal_discovery
  - bayesian_inference
  - uncertainty_and_calibration
  - graphical_and_latent_models
  track_definitions:
