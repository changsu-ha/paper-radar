project:
  name: paper-radar-reinforcement-learning
  language: ko
  timezone: Asia/Seoul
sources:
  arxiv:
    enabled: true
    categories:
    - cs.LG
    - stat.ML
    - cs.AI
    - math.OC
    queries:
    - reinforcement learning OR policy optimization OR actor critic
    - offline RL OR batch RL OR imitation learning theory
    - bandit OR exploration OR regret minimization
    - model-based RL OR world model OR planning
    - reward learning OR preference-based RL OR decision transformer
    days_back_daily: 10
    days_back_weekly: 30
    max_results_per_query: 10
  openreview:
    enabled: false
    venues:
    - ICLR.cc/2026/Conference
    - ICML.cc/2026/Conference
    - NeurIPS.cc/2025/Conference
    - aistats.org/AISTATS/2026/Conference
    - auai.org/UAI/2026/Conference
    keywords:
    - reinforcement learning
    - offline RL
    - bandits
    - model-based RL
    - reward learning
  semanticscholar:
    enabled: true
    api_key_env: SEMANTIC_SCHOLAR_API_KEY
  openalex:
    enabled: false
    api_key_env: OPENALEX_API_KEY
filters:
  include_keywords:
  - reinforcement learning
  - policy optimization
  - actor critic
  - offline rl
  - batch rl
  - imitation learning theory
  - bandit
  - exploration
  - regret minimization
  - model-based rl
