project:
  name: paper-radar-broad-ml
  language: ko
  timezone: Asia/Seoul
sources:
  arxiv:
    enabled: true
    categories:
    - cs.LG
    - stat.ML
    - cs.CL
    - cs.AI
    - cs.CV
    - cs.IR
    - cs.NE
    - math.OC
    - math.ST
    queries:
    - generalization OR optimization OR convergence OR sample complexity OR PAC-Bayes
    - representation learning OR self-supervised OR contrastive OR masked modeling
    - diffusion OR flow matching OR autoregressive OR generative model OR generative
      modeling
    - large language model OR llm OR transformer OR pretraining OR scaling law
    - instruction tuning OR post-training OR preference optimization OR alignment
      OR reward model
    - pretraining data OR data curation OR data filtering OR synthetic data OR data
      mixture
    - in-context learning OR reasoning OR chain-of-thought OR verifier OR search
    - mechanistic interpretability OR circuit OR sparse autoencoder OR feature attribution
    - causal learning OR probabilistic modeling OR bayesian inference OR uncertainty
    - reinforcement learning OR offline RL OR policy optimization OR bandit
    - robustness OR privacy OR fairness OR calibration OR distribution shift
    - efficient training OR distillation OR quantization OR pruning OR low-rank adaptation
    - vision-language model OR multimodal foundation model OR cross-modal learning
    days_back_daily: 10
    days_back_weekly: 30
    max_results_per_query: 8
  openreview:
    enabled: false
    venues:
    - ICLR.cc/2026/Conference
    - ICML.cc/2026/Conference
    - NeurIPS.cc/2025/Conference
    - aistats.org/AISTATS/2026/Conference
    - auai.org/UAI/2026/Conference
    keywords:
    - machine learning theory
    - large language models
    - representation learning
    - data curation
    - alignment
    - causal learning
  semanticscholar:
    enabled: true
    api_key_env: SEMANTIC_SCHOLAR_API_KEY
  openalex:
    enabled: false
    api_key_env: OPENALEX_API_KEY
